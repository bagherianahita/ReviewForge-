name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: reviewforge
          POSTGRES_PASSWORD: reviewforge
          POSTGRES_DB: reviewforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reviewforge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if python -c "import socket; s=socket.socket(); s.settimeout(1); s.connect(('localhost', 5432)); s.close()"; then
              echo "Postgres is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready"
          exit 1
      - run: pip install -r requirements.txt
      - run: pytest -q
        env:
          DATABASE_URL: postgresql+asyncpg://reviewforge:reviewforge@localhost:5432/reviewforge
          SYNC_DATABASE_URL: postgresql://reviewforge:reviewforge@localhost:5432/reviewforge

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
